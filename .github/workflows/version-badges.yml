name: Version badges

# Recompute the dev-vs-CRAN version badges shown in the registry.
# Orange = the package's development version is ahead of its CRAN release.

on:
  schedule:
    - cron: "23 6 * * *"   # daily, 06:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate version badges
        run: python3 .github/scripts/version_badges.py
      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges
          if git diff --cached --quiet; then
            echo "No badge changes."
          else
            git commit -m "Refresh version badges"
            git push
          fi
